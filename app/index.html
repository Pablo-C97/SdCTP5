<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SdeC - Monitor de Señales Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #252538;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #89b4fa; margin-top: 0; }
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            background: #1b1b2a;
            padding: 15px;
            border-radius: 8px;
        }
        .signal-selectors { display: flex; gap: 10px; }
        .axis-selectors { display: flex; align-items: center; gap: 20px; font-size: 14px; }
        .select-group { display: flex; align-items: center; gap: 8px; }
        select {
            background: #45475a;
            color: #cdd6f4;
            border: 1px solid #89b4fa;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button {
            background-color: #45475a;
            color: #cdd6f4;
            border: 2px solid #89b4fa;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover, button.active { background-color: #89b4fa; color: #11111b; }
        .chart-box {
            position: relative;
            background: #11111b;
            padding: 15px;
            border-radius: 8px;
            height: 420px;
        }
        /* Panel de Mediciones de Instrumentación Fijo */
        .measurements-panel {
            display: flex;
            justify-content: space-around;
            background: #11111b;
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #a6e3a1;
        }
        .measure-card { text-align: center; min-width: 120px; }
        .measure-card .title { font-size: 12px; color: #a6adc8; text-transform: uppercase; font-weight: bold; }
        .measure-card .value { font-size: 22px; font-weight: bold; color: #f9e2af; margin-top: 5px; }
        .status {
            text-align: center;
            font-style: italic;
            color: #a6adc8;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Adquisición de Señales</h1>
    
    <div class="controls-row">
        <div class="signal-selectors">
            <button id="btn-sig0" class="active" onclick="changeSignal(0)">Canal: Señal A</button>
            <button id="btn-sig1" onclick="changeSignal(1)">Canal: Señal B</button>
        </div>
        
        <div class="axis-selectors">
            <div class="select-group">
                <label>Eje Y (Voltaje):</label>
                <select id="minY" onchange="updateAxisLimits()">
                    <option value="-5" selected>Mín: -5.0 V</option>
                    <option value="-1">Mín: -1.0 V</option>
                    <option value="0">Mín:  0.0 V</option>
                </select>
                <select id="maxY" onchange="updateAxisLimits()">
                    <option value="1.5">Máx: 1.5 V</option>
                    <option value="3.5">Máx: 3.5 V</option>
                    <option value="5" selected>Máx: 5.0 V</option>
                </select>
            </div>

            <div class="select-group" style="border-left: 2px solid #45475a; padding-left: 20px;">
                <label>Eje X (Base de Tiempo):</label>
                <select id="timeWindow" onchange="updateTimeWindow()">
                    <option value="2">Últimos 2 segundos</option>
                    <option value="5">Últimos 5 segundos</option>
                    <option value="10" selected>Últimos 10 segundos</option>
                    <option value="30">Últimos 30 segundos</option>
                </select>
            </div>
        </div>
    </div>

    <div class="chart-box" style="min-height: 400px; width: 100%; position: relative;">
        <canvas id="liveChart" style="width: 100%; height: 100%;"></canvas>
    </div>
    
    <div class="measurements-panel">
        <div class="measure-card">
            <div class="title" id="m1-title">V Mínimo</div>
            <div class="value" id="m1-value">-- V</div>
        </div>
        <div class="measure-card">
            <div class="title" id="m2-title">V Máximo</div>
            <div class="value" id="m2-value">-- V</div>
        </div>
        <div class="measure-card">
            <div class="title" id="m3-title">Frecuencia</div>
            <div class="value" id="m3-value">-- Hz</div>
        </div>
        <div class="measure-card">
            <div class="title" id="m4-title">Período</div>
            <div class="value" id="m4-value">-- ms</div>
        </div>
    </div>
    
    <div class="status" id="status-text">Conectando con el sistema...</div>
</div>

<script>
    let myChart;
    let currentSignalId = 0;
    
    const SAMPLING_HZ = 20;
    let pointsToDisplay = 10 * SAMPLING_HZ; 

    function initChart(labelName) {
        const ctx = document.getElementById('liveChart').getContext('2d');
        if (myChart) { myChart.destroy(); }

        const minYVal = parseFloat(document.getElementById('minY').value);
        const maxYVal = parseFloat(document.getElementById('maxY').value);

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: labelName,
                    data: [], 
                    borderColor: '#a6e3a1',
                    backgroundColor: 'rgba(166, 227, 161, 0.1)',
                    borderWidth: 2.5,
                    pointRadius: 0, 
                    stepped: currentSignalId === 1, 
                    tension: currentSignalId === 0 ? 0.3 : 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, 
                scales: {
                    x: {
                        title: { display: true, text: 'Tiempo / Estampa Horaria (Eje X)', color: '#cdd6f4' },
                        grid: { color: '#313244' },
                        ticks: { color: '#cdd6f4', maxRotation: 0, autoSkip: true }
                    },
                    y: {
                        title: { display: true, text: 'Voltaje / Magnitud (Eje Y)', color: '#cdd6f4' },
                        grid: { color: '#313244' },
                        ticks: { color: '#cdd6f4' },
                        min: minYVal,
                        max: maxYVal
                    }
                },
                plugins: {
                    legend: { labels: { color: '#cdd6f4' } }
                }
            }
        });
    }

    function updateAxisLimits() {
        if (myChart) {
            myChart.options.scales.y.min = parseFloat(document.getElementById('minY').value);
            myChart.options.scales.y.max = parseFloat(document.getElementById('maxY').value);
            myChart.update();
        }
    }

    function updateTimeWindow() {
        const seconds = parseInt(document.getElementById('timeWindow').value);
        pointsToDisplay = seconds * SAMPLING_HZ;
    }

    function changeSignal(signalId) {
        currentSignalId = signalId;
        document.getElementById('btn-sig0').classList.toggle('active', signalId === 0);
        document.getElementById('btn-sig1').classList.toggle('active', signalId === 1);

        fetch('/api/switch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ signal: signalId })
        })
        .then(res => res.json())
        .then(data => {
            const newLabel = signalId === 0 ? "Señal A" : "Señal B";
            initChart(newLabel);
            document.getElementById('status-text').innerText = "Gráfico reseteado con éxito.";
        });
    }

   
    function calculateMetrics(samples) {
        if (!samples || samples.length < 5) return;

        const values = samples.map(s => s.value);
        const maxV = Math.max(...values);
        const minV = Math.min(...values);

        // Imprimimos los voltajes fijos 
        document.getElementById('m1-value').innerText = `${minV.toFixed(2)} V`;
        document.getElementById('m2-value').innerText = `${maxV.toFixed(2)} V`;

        //  Si la señal es plana (ruido menor a 100mV), no calculamos frecuencia
        if ((maxV - minV) < 0.1) {
            document.getElementById('m3-value').innerText = "0.00 Hz";
            document.getElementById('m4-value').innerText = "∞ ms";
            return;
        }

        // CÁLCULO DEL UMBRAL DINÁMICO
        const dynamicThreshold = (maxV + minV) / 2;

        let edgeCount = 0;
        let firstEdgeIndex = -1;
        let lastEdgeIndex = -1;

        // Buscamos cruces por el umbral dinámico subiendo (flancos de subida)
        for (let i = 1; i < samples.length; i++) {
            if (values[i-1] < dynamicThreshold && values[i] >= dynamicThreshold) {
                edgeCount++;
                if (firstEdgeIndex === -1) firstEdgeIndex = i;
                lastEdgeIndex = i;
            }
        }

        // Si hay al menos un ciclo completo detectado, procesamos tiempo real
        if (edgeCount >= 2 && firstEdgeIndex !== lastEdgeIndex) {
            const timePerSample = 1 / SAMPLING_HZ; 
            const totalSamplesBetweenEdges = lastEdgeIndex - firstEdgeIndex;
            const deltaTime = totalSamplesBetweenEdges * timePerSample; 

            const frequency = ((edgeCount - 1) / deltaTime).toFixed(2);
            const periodMs = ((1 / frequency) * 1000).toFixed(0);

            document.getElementById('m3-value').innerText = `${frequency} Hz`;
            document.getElementById('m4-value').innerText = `${periodMs} ms`;
        } else {
            // Si la ventana de tiempo elegida es muy corta para ver un ciclo entero
            document.getElementById('m3-value').innerText = "... Hz";
            document.getElementById('m4-value').innerText = "... ms";
        }
    }

    function updateData() {
        fetch(`/api/data?signal=${currentSignalId}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === "success" && data.samples.length > 0) {
                let allSamples = data.samples;
                let visibleSamples = allSamples.slice(-pointsToDisplay);
                
                myChart.data.labels = visibleSamples.map(s => s.time);
                myChart.data.datasets[0].data = visibleSamples.map(s => s.value);

                
                document.getElementById('status-text').innerText = 
                    `Sensando: Canal ${currentSignalId === 0 ? 'A' : 'B'} | Muestras visibles: ${visibleSamples.length} pts`;

                myChart.update('none'); 
                calculateMetrics(visibleSamples);
            }
        })
        .catch(err => {
            document.getElementById('status-text').innerText = "Error de comunicación con el dispositivo.";
        });
    }

    
    initChart("Señal A");
    setInterval(updateData, 1000); 
</script>

</body>
</html>
